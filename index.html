<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tekken 8 Stage Tracker</title>
  <style>
    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #141414;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }

    button:focus-visible, select:focus-visible, input:focus-visible {
      outline: 2px solid #888;
      outline-offset: 2px;
    }

    /* ── Layout ── */
    .container { max-width: 860px; margin: 0 auto; padding: 24px 20px 60px; }

    /* ── Season bar ── */
    .season-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .season-pills { display: flex; gap: 8px; flex-wrap: wrap; }
    .season-btn {
      background: transparent;
      border: 1px solid #444;
      color: #bbb;
      border-radius: 20px;
      padding: 6px 18px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .season-btn:hover { border-color: #888; color: #eee; }
    .season-btn.active { background: #2e2e2e; border-color: #888; color: #fff; }
    .add-data-btn {
      background: transparent;
      border: 1px solid #444;
      color: #bbb;
      border-radius: 8px;
      padding: 6px 14px;
      cursor: pointer;
      font-size: 13px;
      white-space: nowrap;
      transition: border-color 0.15s, color 0.15s;
    }
    .add-data-btn:hover { border-color: #888; color: #eee; }

    /* ── Snapshot row ── */
    .snapshot-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
      padding-left: 2px;
    }
    .snapshot-row[hidden] { display: none; }
    .snapshot-row-label {
      text-transform: uppercase;
      font-size: 11px;
      color: #666;
      letter-spacing: 0.05em;
      margin-right: 4px;
    }
    .snapshot-pills { display: flex; gap: 6px; flex-wrap: wrap; }
    .snapshot-btn {
      background: transparent;
      border: 1px solid #333;
      color: #888;
      border-radius: 14px;
      padding: 4px 12px;
      cursor: pointer;
      font-size: 12px;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .snapshot-btn:hover { border-color: #666; color: #ccc; }
    .snapshot-btn.active { background: #2a2a2a; border-color: #777; color: #eee; }
    .snapshot-btn .tag { color: #888; margin-left: 4px; font-size: 11px; }
    .snapshot-btn.active .tag { color: #aaa; }

    .delta-toggle:disabled, .delta-toggle[disabled] {
      opacity: 0.4;
      cursor: not-allowed;
      text-decoration: none;
    }
    .delta-toggle:disabled:hover { color: #666; }

    .entry-panel[hidden], .add-data-btn[hidden] { display: none !important; }

    /* ── Summary cards ── */
    .summary-cards {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }
    .card {
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 18px 20px;
    }
    .card-value {
      font-size: 28px;
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 4px;
    }
    .card-label { font-size: 12px; color: #777; }
    .card-value.green { color: #4caf50; }
    .card-value.red   { color: #e05a5a; }
    .card-value.white { color: #fff; }

    /* ── Chart panel ── */
    .chart-panel {
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 0 0 8px;
      margin-bottom: 24px;
    }

    /* Tabs */
    .tabs {
      display: flex;
      border-bottom: 1px solid #2a2a2a;
      padding: 0 20px;
    }
    .tab-btn {
      background: transparent;
      border: none;
      color: #777;
      padding: 14px 14px 12px;
      cursor: pointer;
      font-size: 13px;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color 0.15s;
    }
    .tab-btn:hover { color: #ccc; }
    .tab-btn.active { color: #fff; border-bottom-color: #fff; }

    /* Filters */
    .filters { display: flex; gap: 8px; padding: 12px 20px 0; }
    .filter-btn {
      background: transparent;
      border: 1px solid #333;
      color: #888;
      border-radius: 6px;
      padding: 4px 12px;
      cursor: pointer;
      font-size: 12px;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .filter-btn:hover { border-color: #666; color: #ccc; }
    .filter-btn.active { background: #2e2e2e; border-color: #888; color: #fff; }

    /* Column header */
    .chart-header {
      display: flex;
      align-items: center;
      padding: 10px 20px 6px;
      font-size: 11px;
      color: #555;
      gap: 4px;
    }
    .delta-toggle {
      background: transparent;
      border: none;
      color: #666;
      cursor: pointer;
      font-size: 11px;
      padding: 0 2px;
      text-decoration: underline;
      transition: color 0.15s;
    }
    .delta-toggle:hover { color: #aaa; }
    .delta-toggle.active { color: #ccc; }

    /* Stage rows */
    .stage-list { padding: 4px 20px 8px; }
    .stage-row {
      display: grid;
      grid-template-columns: 200px 1fr 52px 52px;
      align-items: center;
      gap: 12px;
      padding: 5px 0;
    }
    .stage-name { font-size: 13px; color: #ccc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .bar-track { background: #2a2a2a; border-radius: 3px; height: 8px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 3px; transition: width 0.3s ease; }
    .bar-fill.green { background: #4caf50; }
    .bar-fill.amber { background: #c8960c; }
    .bar-fill.red   { background: #e05a5a; }
    .win-rate { font-size: 13px; color: #ccc; text-align: right; }
    .delta { font-size: 12px; text-align: right; white-space: nowrap; }
    .delta.pos  { color: #4caf50; }
    .delta.neg  { color: #e05a5a; }
    .delta.none { color: #444; }
    .no-stages  { padding: 20px; color: #555; text-align: center; font-size: 13px; }

    /* ── Entry form ── */
    .entry-panel {
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      padding: 20px;
    }
    .entry-panel h3 { font-size: 12px; color: #666; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 14px; }
    .entry-form { display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap; }
    .entry-form select,
    .entry-form input[type="number"] {
      background: #141414;
      border: 1px solid #333;
      color: #ccc;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 13px;
      transition: border-color 0.15s;
    }
    .entry-form select:focus,
    .entry-form input[type="number"]:focus { border-color: #666; }
    #form-season  { width: 80px; }
    #form-stage   { flex: 1; min-width: 180px; }
    #form-winrate { width: 80px; }
    .save-btn {
      background: #2e2e2e;
      border: 1px solid #555;
      color: #ddd;
      border-radius: 6px;
      padding: 8px 20px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.15s, border-color 0.15s;
    }
    .save-btn:hover { background: #3a3a3a; border-color: #888; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #333;
      color: #fff;
      padding: 10px 22px;
      border-radius: 8px;
      font-size: 13px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <div class="container">

    <!-- Season bar -->
    <div class="season-bar">
      <div class="season-pills" id="season-pills"></div>
      <button class="add-data-btn" id="add-data-btn">+ Add Stage Data</button>
    </div>

    <!-- Snapshot row -->
    <div class="snapshot-row" id="snapshot-row" hidden>
      <span class="snapshot-row-label">Snapshots</span>
      <div class="snapshot-pills" id="snapshot-pills"></div>
    </div>

    <!-- Summary cards -->
    <div class="summary-cards" id="summary-cards"></div>

    <!-- Chart panel -->
    <div class="chart-panel">
      <div class="tabs" id="tabs"></div>
      <div class="filters" id="filters"></div>
      <div class="chart-header" id="chart-header"></div>
      <div class="stage-list" id="stage-list"></div>
    </div>

    <!-- Entry form -->
    <div class="entry-panel" id="entry-panel">
      <h3>Add / update data</h3>
      <div class="entry-form">
        <select id="form-season" aria-label="Season"></select>
        <select id="form-stage" aria-label="Stage"></select>
        <input type="number" id="form-winrate" min="0" max="100" step="1" placeholder="Win %" aria-label="Win rate percentage" />
        <button class="save-btn" id="save-btn">Save</button>
      </div>
    </div>

  </div>
  <div class="toast" id="toast">Saved!</div>

  <script>
    // ── XSS guard ───────────────────────────────────────────────────────────────
    // Use escapeHtml() on any string from localStorage before inserting into innerHTML.
    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;')
    }

    // ── Seed data ────────────────────────────────────────────────────────────────
    // Each season holds one or more dated snapshots. Newest is current baseline.
    // Add new snapshots by inserting another date key under the same season.
    const SEED_DATA = {
      S1: {
        "2026-04-11": {
          "Arena": 48, "Arena Underground": 41, "Urban Square Evening": 45, "Urban Square": 41,
          "Yakushima": 49, "Coliseum of Fate": 45, "Rebel Hangar": 46, "Fallen Destiny": 41,
          "Descent into Subconscious": 43, "Sanctum": 48, "Into the Stratosphere": 47,
          "Ortiz Farm": 40, "Celebration on the Seine": 44, "Secluded Training Ground": 49,
          "Elegant Palace": 47, "Midnight Siege": 44, "Seaside Resort": 57,
          "Genmaji Temple": 50, "Genmaji Temple Daytime": 60, "Phoenix Gate": 50
        }
      },
      S2: {
        "2026-04-11": {
          "Arena": 50, "Arena Underground": 40, "Urban Square Evening": 68, "Urban Square": 47,
          "Yakushima": 50, "Coliseum of Fate": 58, "Rebel Hangar": 49, "Fallen Destiny": 52,
          "Descent into Subconscious": 55, "Sanctum": 48, "Into the Stratosphere": 52,
          "Ortiz Farm": 53, "Celebration on the Seine": 51, "Secluded Training Ground": 51,
          "Elegant Palace": 47, "Midnight Siege": 52, "Seaside Resort": 49,
          "Genmaji Temple": 43, "Genmaji Temple Daytime": 53, "Phoenix Gate": 52,
          "Pac-Pixels": 43, "Baobab Horizon": 46
        }
      },
      S3: {
        "2026-04-11": {
          "Arena": 100, "Baobab Horizon": 100, "Secluded Training Ground": 71,
          "Seaside Resort": 71, "Phoenix Gate": 71, "Descent into Subconscious": 66,
          "Coliseum of Fate": 60, "Yakushima": 58, "Midnight Siege": 56,
          "Arena Underground": 56, "Pac-Pixels": 55, "Fallen Destiny": 50,
          "Ortiz Farm": 50, "Elegant Palace": 50, "Genmaji Temple Daytime": 50,
          "Into the Stratosphere": 44, "Celebration on the Seine": 44,
          "Sanctum": 42, "Urban Square Evening": 40, "Urban Square": 40,
          "Rebel Hangar": 37, "Genmaji Temple": 33
        },
        "2026-05-01": {
          "Arena": 58, "Arena Underground": 62, "Baobab Horizon": 66,
          "Celebration on the Seine": 66, "Coliseum of Fate": 63,
          "Descent into Subconscious": 35, "Elegant Palace": 66,
          "Fallen Destiny": 43, "Genmaji Temple": 33, "Genmaji Temple Daytime": 61,
          "Into the Stratosphere": 52, "Midnight Siege": 53, "Ortiz Farm": 57,
          "Pac-Pixels": 50, "Phoenix Gate": 62, "Rebel Hangar": 30,
          "Sanctum": 61, "Seaside Resort": 62, "Secluded Training Ground": 81,
          "Urban Square": 47, "Urban Square Evening": 58, "Yakushima": 58
        }
      }
    }

    // ── localStorage helpers ─────────────────────────────────────────────────────
    const LS_KEY = 'tekken_entries'
    // Test stub — when non-null, getEntries() returns this array directly. Used by runDataTests
    // to inject deterministic localStorage state. Always restored to null in a finally block.
    let _entriesStub = null

    function getEntries() {
      if (_entriesStub !== null) return _entriesStub
      try { return JSON.parse(localStorage.getItem(LS_KEY) || '[]') }
      catch { return [] }
    }

    function saveEntry(season, stage, winRate) {
      const entries = getEntries()
      entries.push({ season, stage, winRate, date: getToday() })
      localStorage.setItem(LS_KEY, JSON.stringify(entries))
    }

    function getToday() {
      return new Date().toISOString().slice(0, 10) // "YYYY-MM-DD"
    }

    // ── Data computations ────────────────────────────────────────────────────────

    /** Returns sorted ascending array of ISO date strings for a season, or [] if missing. */
    function getSnapshotDates(season) {
      return Object.keys(SEED_DATA[season] || {}).sort()
    }

    /** Returns the newest snapshot date for a season, or null if none. */
    function getNewestSnapshotDate(season) {
      const dates = getSnapshotDates(season)
      return dates.length ? dates[dates.length - 1] : null
    }

    /** Returns the raw stage-map for a specific snapshot, or {} if not present. */
    function getSnapshot(season, date) {
      return (SEED_DATA[season] && SEED_DATA[season][date]) || {}
    }

    /**
     * Builds the current state for a season at the given snapshot.
     *
     * Stale-entry rule: localStorage entries with `entry.date < newestSnapshotDate`
     * are dropped (strict less-than). Same-day entries DO layer on top.
     *
     * Historical view (snapshotDate non-null) ignores localStorage entirely — read-only.
     *
     * Returns { stageName: winRate, ... }
     */
    function buildCurrentState(season, snapshotDate = null) {
      if (snapshotDate !== null) {
        return { ...getSnapshot(season, snapshotDate) }
      }
      const newestDate = getNewestSnapshotDate(season)
      if (newestDate === null) return {}
      const base = { ...getSnapshot(season, newestDate) }
      const all = getEntries()
      const entries = all
        .map((e, i) => ({ ...e, _idx: i }))
        .filter(e => e.season === season && e.date >= newestDate)
        .sort((a, b) => {
          const d = b.date.localeCompare(a.date)
          return d !== 0 ? d : b._idx - a._idx // newer date first; same date → later save wins
        })
      const seen = new Set()
      for (const entry of entries) {
        if (!seen.has(entry.stage)) {
          base[entry.stage] = entry.winRate
          seen.add(entry.stage)
        }
      }
      return base
    }

    /** Returns the season key immediately before the given one (by sort order), or null. */
    function getPreviousSeasonKey(season) {
      // Only seasons present in SEED_DATA are considered. Returns null if no prior season exists.
      const keys = Object.keys(SEED_DATA).sort()
      const idx = keys.indexOf(season)
      return idx > 0 ? keys[idx - 1] : null
    }

    /**
     * Computes per-stage deltas for the given season and mode.
     * mode: "last-season"       — current vs previous season's newest snapshot (always newest, even when viewing historical).
     * mode: "previous-snapshot" — viewed snapshot vs the snapshot immediately preceding it within the same season.
     * Returns { stageName: number | null }  (null → render as "—")
     */
    function computeDeltas(season, mode, snapshotDate = null) {
      const current = buildCurrentState(season, snapshotDate)
      let reference = {}

      if (mode === 'last-season') {
        const prevKey = getPreviousSeasonKey(season)
        if (prevKey) {
          reference = getSnapshot(prevKey, getNewestSnapshotDate(prevKey))
        }
      } else if (mode === 'previous-snapshot') {
        const dates = getSnapshotDates(season)
        const viewedDate = snapshotDate !== null ? snapshotDate : getNewestSnapshotDate(season)
        const idx = dates.indexOf(viewedDate)
        if (idx > 0) {
          reference = getSnapshot(season, dates[idx - 1])
        }
      }

      const deltas = {}
      for (const stage of Object.keys(current)) {
        deltas[stage] = stage in reference ? current[stage] - reference[stage] : null
      }
      return deltas
    }

    /** Mean win rate (rounded) across all stages in the given state object. */
    function getOverallWinRate(stateData) {
      const values = Object.values(stateData)
      if (!values.length) return 0
      return Math.round(values.reduce((a, b) => a + b, 0) / values.length)
    }

    /** Returns { name, winRate } for the highest win rate stage. */
    function getBestStage(stateData) {
      return Object.entries(stateData).reduce(
        (best, [name, rate]) => rate > best.winRate ? { name, winRate: rate } : best,
        { name: '—', winRate: -Infinity }
      )
    }

    /** Returns { name, winRate } for the lowest win rate stage. */
    function getWorstStage(stateData) {
      return Object.entries(stateData).reduce(
        (worst, [name, rate]) => rate < worst.winRate ? { name, winRate: rate } : worst,
        { name: '—', winRate: Infinity }
      )
    }

    /** Returns the CSS color class for a win rate value. */
    function barColor(rate) {
      if (rate >= 70) return 'green'
      if (rate >= 45) return 'amber'
      return 'red'
    }

    // ── Data layer tests (verify in console on load) ─────────────────────────────
    // getEntries stubbing: tests set _entriesStub (top-level let) to inject deterministic
    // localStorage state. Each stubbed sub-test is wrapped in try/finally to guarantee the
    // stub is cleared even if an assertion throws — prevents leakage into the live render.
    function runDataTests() {
      // 1. Snapshot navigation
      console.assert(getSnapshotDates('S3').length === 2, 'S3 has 2 snapshots')
      console.assert(getSnapshotDates('S3')[0] === '2026-04-11', 'S3 snapshot[0] = 2026-04-11')
      console.assert(getSnapshotDates('S3')[1] === '2026-05-01', 'S3 snapshot[1] = 2026-05-01')
      console.assert(getSnapshotDates('S1').length === 1, 'S1 has 1 snapshot')
      console.assert(getNewestSnapshotDate('S3') === '2026-05-01', 'S3 newest = 2026-05-01')
      console.assert(getNewestSnapshotDate('S1') === '2026-04-11', 'S1 newest = 2026-04-11')

      // 2. buildCurrentState newest (no localStorage)
      try {
        _entriesStub = []
        const s3 = buildCurrentState('S3')
        console.assert(s3.Arena === 58, 'S3 newest Arena = 58')
        console.assert(s3['Genmaji Temple'] === 33, 'S3 newest Genmaji Temple = 33')
        console.assert(s3['Secluded Training Ground'] === 81, 'S3 newest Secluded Training Ground = 81')
        console.assert(Object.keys(s3).length === 22, 'S3 newest has 22 stages')
      } finally { _entriesStub = null }

      // 3. buildCurrentState historical
      console.assert(buildCurrentState('S3', '2026-04-11').Arena === 100, 'S3 historical Arena = 100')
      console.assert(buildCurrentState('S3', '2026-04-11')['Secluded Training Ground'] === 71, 'S3 historical Secluded = 71')

      // 4. Summary helpers (newest with empty localStorage)
      try {
        _entriesStub = []
        console.assert(getBestStage(buildCurrentState('S3')).name === 'Secluded Training Ground', 'Best = Secluded Training Ground')
        console.assert(getWorstStage(buildCurrentState('S3')).name === 'Rebel Hangar', 'Worst = Rebel Hangar')
        console.assert(getBestStage(buildCurrentState('S3', '2026-04-11')).name === 'Arena', 'Historical best = Arena')
      } finally { _entriesStub = null }

      // 5. Previous-season helpers
      console.assert(getPreviousSeasonKey('S3') === 'S2', 'prev(S3) = S2')
      console.assert(getPreviousSeasonKey('S2') === 'S1', 'prev(S2) = S1')
      console.assert(getPreviousSeasonKey('S1') === null, 'prev(S1) = null')

      // 6. Delta: previous-snapshot
      try {
        _entriesStub = []
        console.assert(computeDeltas('S3', 'previous-snapshot').Arena === -42, 'S3 prev-snap Arena = -42')
        console.assert(computeDeltas('S3', 'previous-snapshot')['Secluded Training Ground'] === 10, 'S3 prev-snap Secluded = +10')
        console.assert(computeDeltas('S3', 'previous-snapshot', '2026-04-11').Arena === null, 'S3 historical prev-snap Arena = null')
        console.assert(computeDeltas('S1', 'previous-snapshot').Arena === null, 'S1 prev-snap Arena = null (single snapshot)')
      } finally { _entriesStub = null }

      // 7. Delta: last-season
      try {
        _entriesStub = []
        console.assert(computeDeltas('S3', 'last-season').Arena === 8, 'S3 last-season Arena = 8 (58-50)')
        console.assert(computeDeltas('S3', 'last-season', '2026-04-11').Arena === 50, 'S3 historical last-season Arena = 50 (100-50)')
        console.assert(computeDeltas('S1', 'last-season').Arena === null, 'S1 last-season Arena = null')
      } finally { _entriesStub = null }

      // 8. barColor & escapeHtml unchanged
      console.assert(barColor(70) === 'green', 'barColor 70 = green')
      console.assert(barColor(45) === 'amber', 'barColor 45 = amber')
      console.assert(barColor(44) === 'red',   'barColor 44 = red')
      const escaped = escapeHtml('<scr' + 'ipt>alert(1)</scr' + 'ipt>')
      console.assert(!escaped.includes('<script>'), 'escapeHtml strips script tags')

      // 9. Stale-entry rule (strict <)
      try {
        _entriesStub = [{ season: 'S3', stage: 'Arena', winRate: 99, date: '2026-04-15' }]
        console.assert(buildCurrentState('S3').Arena === 58, 'Stale entry (2026-04-15) dropped, Arena = 58')
      } finally { _entriesStub = null }

      try {
        _entriesStub = [{ season: 'S3', stage: 'Arena', winRate: 99, date: '2026-05-01' }]
        console.assert(buildCurrentState('S3').Arena === 99, 'Same-day entry layers, Arena = 99')
      } finally { _entriesStub = null }

      try {
        _entriesStub = [
          { season: 'S3', stage: 'Arena', winRate: 99, date: '2026-05-01' },
          { season: 'S3', stage: 'Arena', winRate: 77, date: '2026-05-01' }
        ]
        console.assert(buildCurrentState('S3').Arena === 77, 'Latest same-day save wins, Arena = 77')
      } finally { _entriesStub = null }

      try {
        _entriesStub = [{ season: 'S3', stage: 'Arena', winRate: 99, date: '2026-05-01' }]
        console.assert(buildCurrentState('S3', '2026-04-11').Arena === 100, 'Historical view ignores localStorage, Arena = 100')
      } finally { _entriesStub = null }

      console.log('[DataTests] All assertions passed')
    }
    runDataTests()

    // ── State ────────────────────────────────────────────────────────────────────
    const state = {
      activeSeason: Object.keys(SEED_DATA).sort().at(-1), // default to last season
      activeSnapshot: null,  // null = newest snapshot of activeSeason; otherwise ISO date string
      activeTab: 'all',      // 'all' | 'trending-up' | 'trending-down'
      activeFilter: 'all',   // 'all' | 'strong' | 'weak'
      deltaMode: 'last-season', // 'last-season' | 'previous-snapshot'
    }

    // ── Render: Season bar ───────────────────────────────────────────────────────
    function renderSeasonBar() {
      document.getElementById('season-pills').innerHTML =
        Object.keys(SEED_DATA).sort().map(key => {
          const active = key === state.activeSeason ? ' active' : ''
          return `<button class="season-btn${active}" data-season="${escapeHtml(key)}">${escapeHtml(key)}</button>`
        }).join('')
    }

    // ── Render: Snapshot pills ───────────────────────────────────────────────────
    function renderSnapshotPills() {
      const row = document.getElementById('snapshot-row')
      const pills = document.getElementById('snapshot-pills')
      const dates = getSnapshotDates(state.activeSeason)
      if (dates.length <= 1) {
        row.hidden = true
        pills.innerHTML = ''
        return
      }
      row.hidden = false
      const newest = dates[dates.length - 1]
      pills.innerHTML = dates.map(date => {
        const isActive = (state.activeSnapshot === null && date === newest) || state.activeSnapshot === date
        const activeClass = isActive ? ' active' : ''
        const tag = date === newest ? '<span class="tag">current</span>' : ''
        return `<button class="snapshot-btn${activeClass}" data-snapshot="${escapeHtml(date)}">${escapeHtml(date)}${tag}</button>`
      }).join('')
    }

    // ── Render: Summary cards ────────────────────────────────────────────────────
    function renderSummaryCards() {
      const current = buildCurrentState(state.activeSeason, state.activeSnapshot)
      const overall = getOverallWinRate(current)
      const best    = getBestStage(current)
      const worst   = getWorstStage(current)

      document.getElementById('summary-cards').innerHTML = `
        <div class="card">
          <div class="card-value white">${overall}%</div>
          <div class="card-label">Overall win rate</div>
        </div>
        <div class="card">
          <div class="card-value green">${escapeHtml(best.name)}</div>
          <div class="card-label">Best stage (${best.winRate}%)</div>
        </div>
        <div class="card">
          <div class="card-value red">${escapeHtml(worst.name)}</div>
          <div class="card-label">Worst stage (${worst.winRate}%)</div>
        </div>
      `
    }

    // ── Render: Chart section ────────────────────────────────────────────────────
    function renderChart() {
      renderTabs()
      renderFilters()
      renderChartHeader()
      renderStageList()
    }

    function renderTabs() {
      const tabs = [
        { id: 'all',           label: 'All stages' },
        { id: 'trending-up',   label: 'Trending up' },
        { id: 'trending-down', label: 'Trending down' },
      ]
      document.getElementById('tabs').innerHTML = tabs.map(t => {
        const active = t.id === state.activeTab ? ' active' : ''
        return `<button class="tab-btn${active}" data-tab="${t.id}">${t.label}</button>`
      }).join('')
    }

    function renderFilters() {
      const filters = [
        { id: 'all',    label: 'All' },
        { id: 'strong', label: 'Strong (70%+)' },
        { id: 'weak',   label: 'Weak (sub 45%)' },
      ]
      document.getElementById('filters').innerHTML = filters.map(f => {
        const active = f.id === state.activeFilter ? ' active' : ''
        return `<button class="filter-btn${active}" data-filter="${f.id}">${f.label}</button>`
      }).join('')
    }

    function renderChartHeader() {
      const seasonActive = state.deltaMode === 'last-season' ? ' active' : ''
      const snapActive   = state.deltaMode === 'previous-snapshot' ? ' active' : ''
      const hasMultiSnapshot = getSnapshotDates(state.activeSeason).length > 1
      const disabledAttr = hasMultiSnapshot ? '' : ' disabled'
      const dateLabel = state.activeSnapshot !== null
        ? state.activeSnapshot
        : (getNewestSnapshotDate(state.activeSeason) || '—')
      const seasonToggle = `<button class="delta-toggle${seasonActive}" data-delta="last-season">last season</button>`
      const snapToggle   = `<button class="delta-toggle${snapActive}" data-delta="previous-snapshot"${disabledAttr}>previous snapshot</button>`
      document.getElementById('chart-header').innerHTML =
        `Stage &mdash; ${escapeHtml(state.activeSeason)} (${escapeHtml(dateLabel)}) win rate &mdash; vs ${seasonToggle} / ${snapToggle}`
    }

    function renderStageList() {
      const current = buildCurrentState(state.activeSeason, state.activeSnapshot)
      const deltas  = computeDeltas(state.activeSeason, state.deltaMode, state.activeSnapshot)

      // Sort by win rate descending
      let rows = Object.entries(current).sort((a, b) => b[1] - a[1])

      // Tab filter (trending requires a non-null delta)
      if (state.activeTab === 'trending-up') {
        rows = rows.filter(([name]) => deltas[name] !== null && deltas[name] > 0)
      } else if (state.activeTab === 'trending-down') {
        rows = rows.filter(([name]) => deltas[name] !== null && deltas[name] < 0)
      }

      // Strength filter
      if (state.activeFilter === 'strong') {
        rows = rows.filter(([, rate]) => rate >= 70)
      } else if (state.activeFilter === 'weak') {
        rows = rows.filter(([, rate]) => rate < 45)
      }

      if (!rows.length) {
        document.getElementById('stage-list').innerHTML =
          '<div class="no-stages">No stages match the current filters.</div>'
        return
      }

      document.getElementById('stage-list').innerHTML = rows.map(([name, rate]) => {
        const color = barColor(rate)
        const delta = deltas[name]
        let deltaHtml
        if (delta === null || delta === 0) {
          deltaHtml = `<span class="delta none">&mdash;</span>`
        } else if (delta > 0) {
          deltaHtml = `<span class="delta pos">+${delta}%</span>`
        } else {
          deltaHtml = `<span class="delta neg">${delta}%</span>`
        }
        return `
          <div class="stage-row">
            <span class="stage-name">${escapeHtml(name)}</span>
            <div class="bar-track"><div class="bar-fill ${color}" style="width:${rate}%"></div></div>
            <span class="win-rate">${rate}%</span>
            ${deltaHtml}
          </div>`
      }).join('')
    }

    // ── Render: Entry form ───────────────────────────────────────────────────────
    function renderEntryForm() {
      const seasonSelect = document.getElementById('form-season')

      // Only rebuild season options if the set of seasons changed (avoid resetting user selection)
      const seasonKeys = Object.keys(SEED_DATA).sort()
      if (seasonSelect.options.length !== seasonKeys.length) {
        seasonSelect.innerHTML = seasonKeys.map(key =>
          `<option value="${escapeHtml(key)}">${escapeHtml(key)}</option>`
        ).join('')
      }
      seasonSelect.value = state.activeSeason
      populateStageDropdown(seasonSelect.value)
    }

    function populateStageDropdown(season) {
      const stages = Object.keys(getSnapshot(season, getNewestSnapshotDate(season))).sort()
      document.getElementById('form-stage').innerHTML = stages.map(s =>
        `<option value="${escapeHtml(s)}">${escapeHtml(s)}</option>`
      ).join('')
    }

    // ── Toast ────────────────────────────────────────────────────────────────────
    let toastTimer = null
    function showToast(msg = 'Saved!') {
      const toast = document.getElementById('toast')
      toast.textContent = msg
      toast.classList.add('show')
      clearTimeout(toastTimer)
      toastTimer = setTimeout(() => toast.classList.remove('show'), 2000)
    }

    // ── Save handler ─────────────────────────────────────────────────────────────
    function handleSave() {
      const season  = document.getElementById('form-season').value
      const stage   = document.getElementById('form-stage').value
      const raw     = document.getElementById('form-winrate').value
      const winRate = parseInt(raw, 10)

      if (!season || !stage || raw === '' || isNaN(winRate) || winRate < 0 || winRate > 100) {
        showToast('Enter a win % between 0 and 100')
        return
      }

      saveEntry(season, stage, winRate)
      document.getElementById('form-winrate').value = ''
      showToast()
      render()
    }

    // Historical snapshots are read-only — hide entry form and Add button.
    function renderEntryPanelVisibility() {
      const hide = state.activeSnapshot !== null
      document.getElementById('entry-panel').hidden = hide
      document.getElementById('add-data-btn').hidden = hide
    }

    // ── Render orchestrator ──────────────────────────────────────────────────────
    function render() {
      renderSeasonBar()
      renderSnapshotPills()
      renderSummaryCards()
      renderChart()
      renderEntryForm()
      renderEntryPanelVisibility()
    }

    // ── Event delegation ─────────────────────────────────────────────────────────
    document.addEventListener('click', e => {
      const seasonBtn = e.target.closest('[data-season]')
      if (seasonBtn) {
        state.activeSeason = seasonBtn.dataset.season
        state.activeSnapshot = null
        if (state.deltaMode === 'previous-snapshot' && getSnapshotDates(state.activeSeason).length <= 1) {
          state.deltaMode = 'last-season'
        }
        render()
        return
      }

      const snapshotBtn = e.target.closest('[data-snapshot]')
      if (snapshotBtn) {
        const date = snapshotBtn.dataset.snapshot
        const newest = getNewestSnapshotDate(state.activeSeason)
        state.activeSnapshot = (date === newest) ? null : date
        render()
        return
      }

      const tabBtn = e.target.closest('[data-tab]')
      if (tabBtn) {
        state.activeTab = tabBtn.dataset.tab
        renderChart()
        return
      }

      const filterBtn = e.target.closest('[data-filter]')
      if (filterBtn) {
        state.activeFilter = filterBtn.dataset.filter
        renderChart()
        return
      }

      const deltaBtn = e.target.closest('[data-delta]')
      if (deltaBtn) {
        if (deltaBtn.disabled) return
        state.deltaMode = deltaBtn.dataset.delta
        renderChart()
        return
      }

      if (e.target.closest('#add-data-btn')) {
        document.getElementById('entry-panel').scrollIntoView({ behavior: 'smooth' })
        document.getElementById('form-winrate').focus()
        return
      }

      if (e.target.closest('#save-btn')) {
        handleSave()
        return
      }
    })

    // Re-populate stage dropdown when season changes in the form
    document.getElementById('form-season').addEventListener('change', e => {
      populateStageDropdown(e.target.value)
    })

    // ── Initial render ────────────────────────────────────────────────────────────
    render()
  </script>
</body>
</html>
